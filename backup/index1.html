<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#fff;
}

.navbar{
    width:100%;
    background:#fff;
    padding:20px 24px;
}

.nav-links{
    display:flex;
    gap:42px;
}

.nav-links a{
    position:relative;
    text-decoration:none;
    color:#222;
    font-size:14px;
    font-weight:600;
    padding-bottom:10px;
    transition:.25s;
}

.nav-links a:hover{
    color:#000;
}

.nav-links a.active{
    color:#000;
}

.nav-links a.active::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    height:3px;
    background:#111;
    border-radius:2px;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="nav-links">
        <a href="#" class="active">Home</a>
        <a href="#">Product</a>
        <a href="#">Solutions</a>
        <a href="#">Developers</a>
        <a href="#">Pricing</a>
    </div>
</nav>

<script>
const links = document.querySelectorAll(".nav-links a");

links.forEach(link => {
    link.addEventListener("click", function(e){

        // Remove if these are just demo links
        e.preventDefault();

        // Remove active class
        links.forEach(item => item.classList.remove("active"));

        // Add to clicked link
        this.classList.add("active");
    });
});
</script>

</body>
</html>
